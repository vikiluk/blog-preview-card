<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Blog preview card</title>

  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <article class="card">
    <figure class="card-figure">
      <img src="assets/images/illustration-article.svg"
          alt="Illustration image for blog article"
          class="card-image">
    </figure>

    <span class="learning-tag">Learning</span>

    <p class="published-date">
      Published <time datetime="2023-12-21">21 Dec 2023</time>
    </p>

    <h1 class="card-title">HTML & CSS foundations</h1>

    <p class="card-text">These languages are the backbone of every website, defining structure, content, and presentation.</p>

    <div class="author">
      <img src="assets/images/image-avatar.webp" alt="Profile picture of Greg Hooper" class="author-picture">
      <span class="author-name">Greg Hooper</span>
    </div>
  </article>
</body>
</html>
